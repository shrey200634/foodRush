server:
  port: 8085

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.type.mapping: deliveryCompleted:com.foodDelivery.payment_service.dto.DeliveryCompletedEvent,orderCancelled:com.foodDelivery.payment_service.dto.OrderCancelledEvent,paymentCompleted:com.foodDelivery.payment_service.dto.PaymentCompletedEvent,paymentFailed:com.foodDelivery.payment_service.dto.PaymentFailedEvent
    consumer:
      group-id: payment-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: deliveryCompleted:com.foodDelivery.payment_service.dto.DeliveryCompletedEvent,orderCancelled:com.foodDelivery.payment_service.dto.OrderCancelledEvent,paymentCompleted:com.foodDelivery.payment_service.dto.PaymentCompletedEvent,paymentFailed:com.foodDelivery.payment_service.dto.PaymentFailedEvent

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

jwt:
  secret: ${JWT_SECRET:default-secret-key-for-jwt-signing-must-be-at-least-256-bits-long}
  expiration-ms: ${JWT_EXPIRATION:86400000}

payment:
  settlement:
    max-retries: 3
    platform-fee-percent: 5.0

management:
  endpoints:
    web:
      exposure:
        include: "health,info,prometheus"
  endpoint:
    prometheus:
      enabled: true
  health:
    show-details: always
  metrics:
    tags:
      application: payment-service 
    export:
      prometheus:
        enabled: true